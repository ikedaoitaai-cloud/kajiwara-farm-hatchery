<body class="bg-cream font-sans text-ink">
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

// ===== 計算ロジック =====
const piecewiseLinear = (age) => {
    if (age < 165) return 20.0;
    if (age <= 230) return 20 + (40 - 20) * (age - 165) / (230 - 165);
    if (age <= 250) return 40.0;
    if (age <= 530) return 40 - (40 - 35) * (age - 250) / (530 - 250);
    return 35 - (35 - 32) * Math.min((age - 530) / 200, 1.0);
};
const asymmetricNormal = (age) => {
    const sigma = age <= 240 ? 32 : 300;
    return 24.5 + 15.5 * Math.exp(-0.5 * Math.pow((age - 240) / sigma, 2));
};
const storageFactor = (days) => {
    if (days <= 7) return 1.0;
    if (days <= 10) return 0.95;
    if (days <= 16) return 0.85;
    return 0.60;
};
const seasonFactor = (month) => {
    if (month >= 6 && month <= 9) return 0.92;
    if (month === 1) return 0.95;
    return 1.0;
};
const calcOneFarm = (age, eggs, storageDays, month) => {
    const a = parseInt(age) || 0;
    const e = parseInt(eggs) || 0;
    const d = parseInt(storageDays) || 0;
    if (a <= 0 || e <= 0) return null;
    const sf = storageFactor(d);
    const seaf = seasonFactor(month);
    const linRate = piecewiseLinear(a);
    const norRate = asymmetricNormal(a);
    const linTotal = Math.round(e * (linRate / 100) * sf * seaf);
    const norTotal = Math.round(e * (norRate / 100) * sf * seaf);
    return {
        linear: { totalChicks: linTotal, femaleChicks: Math.round(linTotal * 0.61), hatchRate: ((linTotal / e) * 100).toFixed(1) },
        normal: { totalChicks: norTotal, femaleChicks: Math.round(norTotal * 0.61), hatchRate: ((norTotal / e) * 100).toFixed(1) }
    };
};
const calcTotals = (farmResults, totalEggs) => {
    if (totalEggs === 0) return null;
    const linTotal = farmResults.reduce((s, r) => s + (r ? r.linear.totalChicks : 0), 0);
    const norTotal = farmResults.reduce((s, r) => s + (r ? r.normal.totalChicks : 0), 0);
    return {
        totalEggs,
        linear: { totalChicks: linTotal, femaleChicks: Math.round(linTotal * 0.61), hatchRate: ((linTotal / totalEggs) * 100).toFixed(1) },
        normal: { totalChicks: norTotal, femaleChicks: Math.round(norTotal * 0.61), hatchRate: ((norTotal / totalEggs) * 100).toFixed(1) }
    };
};
const getMonth = (dateStr) => new Date(dateStr + 'T00:00:00').getMonth() + 1;
const WEEKDAYS = ['日', '月', '火', '水', '木', '金', '土'];
const fmtDateFull = (s) => { const d = new Date(s + 'T00:00:00'); return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日（${WEEKDAYS[d.getDay()]}）`; };
const fmtDateMD = (s) => { const d = new Date(s + 'T00:00:00'); return `${d.getMonth() + 1}月${d.getDate()}日（${WEEKDAYS[d.getDay()]}）`; };
const padZ = (n) => String(n).padStart(2, '0');
const modelName = (m) => m === 'normal' ? '非対称正規分布' : '区分線形';

// ===== マイグレーション =====
const migrateToV4 = (r) => ({
    ...r,
    farms: (r.farms || []).map(f => ({
        id: f.id || (Date.now() + Math.random()),
        farmName: f.farmName || '',
        parentAge: f.parentAge || parseInt(f.age) || 0,
        eggCount: f.eggCount || parseInt(f.eggs) || 0,
        storageDays: f.storageDays || 0,
        predictions: f.predictions || null,
        actual: f.actual || { femaleChicks: null, totalChicks: null, recordedDate: null }
    })),
    totalPredictions: r.totalPredictions || r.predictions || null
});

// ===== 共通: 数値入力フィールド =====
function NumberField({ value, onChange, placeholder, unit, min, max, box }) {
    return (
        <div className={`flex items-baseline gap-1 rounded-[12px] border-2 px-4 py-[10px] ${box}`}>
            <input type="number" value={value} onChange={onChange} placeholder={placeholder}
                inputMode="numeric" min={min} max={max}
                className="flex-1 w-full min-w-0 bg-transparent outline-none text-[20px] font-bold text-ink placeholder:text-faint placeholder:font-medium" />
            {unit && <span className="shrink-0 text-[13px] font-medium text-faint">{unit}</span>}
        </div>
    );
}

// ===== 共通: ページヘッダー =====
function PageHeader({ records, border = 'border-brand-hd', onBack, onAdmin, onExport }) {
    const subBtn = "bg-soft border-2 border-line rounded-[10px] px-5 py-[11px] text-[16px] text-body font-semibold hover:bg-line transition-colors";
    return (
        <header className={`bg-white border-b-2 ${border} px-6 sm:px-12 py-5 flex items-center justify-between flex-shrink-0 flex-wrap gap-3`}>
            <div className="flex items-center gap-4">
                <span className="text-[52px] leading-none">🐣</span>
                <div>
                    <div className="text-[22px] font-bold text-ink leading-tight">孵化率予測システム</div>
                    <div className="text-[18px] text-brand-mid font-extrabold mt-1">カジワラファーム</div>
                </div>
            </div>
            <div className="flex items-center gap-3 flex-wrap">
                <div className="bg-brand-bg border-2 border-brand-border rounded-[10px] px-[22px] py-[11px] text-[16px] text-brand-deep font-bold whitespace-nowrap">📊 記録数：{records.length}件</div>
                {onAdmin && <button onClick={onAdmin} className={subBtn}>⚙️ 管理</button>}
                {onExport && <button onClick={onExport} className={subBtn}>📤 出力</button>}
                {onBack && <button onClick={onBack} className="bg-soft border-2 border-line rounded-[10px] px-6 py-[11px] text-[16px] text-body font-bold hover:bg-line transition-colors whitespace-nowrap">← ホームへ戻る</button>}
            </div>
        </header>
    );
}

// ===== 共通: タイトルバー =====
function TitleBar({ border, icon, title, subtitle, stack }) {
    return (
        <div className={`bg-white border-b-2 ${border} px-6 sm:px-12 py-[14px] flex-shrink-0 ${stack ? '' : 'flex items-center gap-4 flex-wrap'}`}>
            <div className="text-[26px] font-bold text-ink">{icon} {title}</div>
            {subtitle && <div className={`text-[15px] text-faint ${stack ? 'mt-1' : ''}`}>{subtitle}</div>}
        </div>
    );
}

// ===== モーダル =====
function Modal({ config, onClose }) {
    if (!config) return null;
    return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ backgroundColor: 'rgba(28,25,23,0.5)' }}>
            <div className="bg-white rounded-[20px] shadow-2xl p-7 w-full max-w-sm fade-in">
                <p className="text-center text-ink text-[19px] font-medium leading-relaxed mb-6 whitespace-pre-line">{config.message}</p>
                {config.type === 'alert' ? (
                    <button onClick={onClose} className="w-full py-4 bg-brand hover:bg-brand-hover text-white text-[18px] font-bold rounded-[14px] transition-colors">OK</button>
                ) : (
                    <div className="flex gap-3">
                        <button onClick={() => { config.onConfirm(); onClose(); }}
                            className={`flex-1 py-4 text-[18px] font-bold rounded-[14px] text-white transition-colors ${config.danger ? 'bg-[#EF4444] hover:bg-[#DC2626]' : 'bg-brand hover:bg-brand-hover'}`}>
                            {config.confirmLabel || '確認'}
                        </button>
                        <button onClick={onClose} className="flex-1 py-4 bg-soft hover:bg-line text-body text-[18px] font-medium rounded-[14px] transition-colors">
                            キャンセル
                        </button>
                    </div>
                )}
            </div>
        </div>
    );
}

// ===== トースト =====
function Toast({ message, onHide }) {
    useEffect(() => { const t = setTimeout(onHide, 2500); return () => clearTimeout(t); }, []);
    return (
        <div className="fixed bottom-8 left-1/2 z-40 toast-anim" style={{ transform: 'translateX(-50%)' }}>
            <div className="bg-ink text-white px-6 py-4 rounded-full shadow-xl text-[17px] font-medium whitespace-nowrap">
                ✓ {message}
            </div>
        </div>
    );
}

// ===== メインアプリ =====
function App() {
    const [screen, setScreen] = useState('top');
    const [records, setRecords] = useState([]);
    const [calcModel, setCalcModelState] = useState(() => localStorage.getItem('calcModel') || 'linear');
    const [modalConfig, setModalConfig] = useState(null);
    const [toast, setToast] = useState(null);

    const setCalcModel = (m) => { setCalcModelState(m); localStorage.setItem('calcModel', m); };

    useEffect(() => {
        try {
            const v4 = localStorage.getItem('hatcheryRecordsV4');
            if (v4) { const p = JSON.parse(v4); if (Array.isArray(p)) { setRecords(p); return; } }
            const v3 = localStorage.getItem('hatcheryRecordsV3');
            if (v3) { const p = JSON.parse(v3); if (Array.isArray(p)) { const m = p.map(migrateToV4); setRecords(m); localStorage.setItem('hatcheryRecordsV4', JSON.stringify(m)); } }
        } catch { showAlert('データの読み込みに失敗しました。', true); }
    }, []);

    const persistRecords = (nr) => {
        try {
            localStorage.setItem('hatcheryRecordsV4', JSON.stringify(nr));
            setRecords(nr);
            return true;
        } catch (e) {
            showAlert(e.name === 'QuotaExceededError' ? '保存容量が不足しています。古い記録を削除してください。' : 'データの保存に失敗しました。', true);
            return false;
        }
    };
    const showAlert = (msg, isErr = false) => setModalConfig({ type: 'alert', message: msg, isError: isErr });
    const showConfirm = (msg, onConfirm, label = '確認', danger = false) => setModalConfig({ type: 'confirm', message: msg, onConfirm, confirmLabel: label, danger });
    const showToast = (msg) => setToast(msg);
    const addRecord = (r) => { if (persistRecords([r, ...records])) showToast('記録として保存しました'); };
    const updateRecord = (id, fn) => persistRecords(records.map(r => r.id === id ? fn(r) : r));

    const shared = { screen, setScreen, records, addRecord, updateRecord, persistRecords, showAlert, showConfirm, showToast, calcModel, setCalcModel };

    return (
        <>
            <Modal config={modalConfig} onClose={() => setModalConfig(null)} />
            {toast && <Toast message={toast} onHide={() => setToast(null)} />}
            {screen === 'top'         && <TopScreen {...shared} />}
            {screen === 'admin'       && <AdminScreen {...shared} />}
            {screen === 'export'      && <DataExportScreen {...shared} />}
            {screen === 'calculation' && <CalculationScreen {...shared} />}
            {screen === 'results'     && <HatchResultsScreen {...shared} />}
        </>
    );
}

// ===== トップページ =====
function TopScreen({ setScreen, records, calcModel }) {
    const today = new Date().toISOString().split('T')[0];
    const label = modelName(calcModel) + (calcModel === 'normal' ? '（参考）' : '（推奨）');
    return (
        <div className="min-h-screen bg-cream flex flex-col">
            <PageHeader records={records} onAdmin={() => setScreen('admin')} onExport={() => setScreen('export')} />
            <main className="flex-1 flex flex-col items-center justify-center px-6 sm:px-16 py-10">
                <div className="text-center mb-11">
                    <div className="text-[20px] text-brand-mid font-extrabold mb-2.5">{fmtDateFull(today)}</div>
                    <div className="text-[44px] font-black text-ink leading-tight tracking-tight">今日は何をしますか？</div>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-7 w-full max-w-[960px] mb-9">
                    {/* 計算 */}
                    <button onClick={() => setScreen('calculation')}
                        className="bg-white rounded-[24px] px-10 py-11 border-[3px] border-brand-border text-center shadow-[0_4px_24px_rgba(217,119,6,0.15)] hover:-translate-y-0.5 transition-transform">
                        <div className="w-24 h-24 bg-brand-bg border-[3px] border-brand-border rounded-[28px] flex items-center justify-center mx-auto mb-6 text-[48px] leading-none">🧮</div>
                        <div className="text-[30px] font-bold text-ink mb-3.5 leading-tight">入卵数の計算</div>
                        <div className="text-[19px] text-body leading-loose mb-8">日齢・入卵数・貯卵日数を<br />入力して孵化予測をおこないます</div>
                        <div className="bg-brand hover:bg-brand-hover transition-colors text-white rounded-[16px] px-8 py-[22px] text-[22px] font-bold">計算する</div>
                    </button>
                    {/* 実績 */}
                    <button onClick={() => setScreen('results')}
                        className="bg-white rounded-[24px] px-10 py-11 border-[3px] border-sec-border text-center shadow-[0_4px_24px_rgba(124,58,237,0.12)] hover:-translate-y-0.5 transition-transform">
                        <div className="w-24 h-24 bg-sec-bg border-[3px] border-sec-border rounded-[28px] flex items-center justify-center mx-auto mb-6 text-[48px] leading-none">📋</div>
                        <div className="text-[30px] font-bold text-ink mb-3.5 leading-tight">孵化実績入力</div>
                        <div className="text-[19px] text-body leading-loose mb-8">実際の孵化羽数を<br />記録します</div>
                        <div className="bg-sec hover:bg-sec-hover transition-colors text-white rounded-[16px] px-8 py-[22px] text-[22px] font-bold">実績を入力する</div>
                    </button>
                </div>
                <button onClick={() => setScreen('admin')}
                    className="flex items-center gap-2 opacity-45 hover:opacity-80 transition-opacity border border-[#D6D3D1] rounded-[8px] px-4 py-2">
                    <span className="text-[12px] text-[#78716C]">使用モデル：{label}</span>
                    <span className="text-[12px] text-[#78716C] underline">変更</span>
                </button>
            </main>
        </div>
    );
}

// ===== データ出力画面 =====
function DataExportScreen({ setScreen, records, persistRecords, showAlert, showConfirm, showToast }) {

    const exportCSV = () => {
        if (records.length === 0) { showAlert('エクスポートする記録がありません'); return; }
        const header = ['入卵日', '農場名', '入卵数', '貯卵日数', '親鳥日齢', '予測メス鶏数', '予測総孵化数', '予測孵化率%', '実績メス鶏数', '実績総孵化数', '実績記録日', '登録日時'];
        const rows = records.flatMap(r =>
            r.farms.map(f => [
                r.incubationDate, f.farmName, f.eggCount, f.storageDays, f.parentAge,
                f.predictions?.linear?.femaleChicks ?? '',
                f.predictions?.linear?.totalChicks ?? '',
                f.predictions?.linear?.hatchRate ?? '',
                f.actual?.femaleChicks ?? '',
                f.actual?.totalChicks ?? '',
                f.actual?.recordedDate ? new Date(f.actual.recordedDate).toLocaleString('ja-JP') : '',
                new Date(r.recordDate).toLocaleString('ja-JP')
            ])
        );
        const csv = '﻿' + [header, ...rows].map(row => row.join(',')).join('\n');
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
        a.download = `孵化記録_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
        showToast('CSVをダウンロードしました');
    };

    const exportJSON = () => {
        if (records.length === 0) { showAlert('エクスポートする記録がありません'); return; }
        const data = { version: 'v4', exportDate: new Date().toISOString(), records };
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }));
        a.download = `孵化記録バックアップ_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        showToast('バックアップを保存しました');
    };

    const importJSON = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const data = JSON.parse(ev.target.result);
                let imported;
                if (data.version === 'v4' && Array.isArray(data.records)) imported = data.records;
                else if (data.version === 'v3' && Array.isArray(data.records)) imported = data.records.map(migrateToV4);
                else if (Array.isArray(data)) imported = data.map(migrateToV4);
                else throw new Error('Unknown format');
                showConfirm(
                    `${imported.length}件の記録をインポートします。\n現在の記録と統合されます。よろしいですか？`,
                    () => {
                        const ids = new Set(records.map(r => r.id));
                        const merged = [...imported.filter(r => !ids.has(r.id)), ...records];
                        merged.sort((a, b) => new Date(b.recordDate) - new Date(a.recordDate));
                        if (persistRecords(merged)) showToast(`${imported.length}件をインポートしました`);
                    }, 'インポート'
                );
            } catch { showAlert('ファイルの読み込みに失敗しました。バックアップファイルを確認してください。', true); }
        };
        reader.readAsText(file);
        e.target.value = '';
    };

    return (
        <div className="min-h-screen bg-cream flex flex-col">
            <PageHeader records={records} onBack={() => setScreen('top')} />
            <TitleBar border="border-ok-border" icon="📤" title="データ出力" />
            <main className="flex-1 px-6 sm:px-12 py-8">
                <div className="bg-white rounded-[16px] px-7 py-5 mb-7 border-2 border-line flex items-center gap-3.5">
                    <div className="text-[28px]">💾</div>
                    <div>
                        <div className="text-[18px] font-bold text-ink">現在 <span className="text-[28px] text-brand font-black">{records.length}件</span> の入卵記録が保存されています</div>
                        <div className="text-[15px] text-faint mt-1">定期的にバックアップを取ることをおすすめします</div>
                    </div>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                    {/* CSV */}
                    <button onClick={exportCSV}
                        className="bg-white rounded-[20px] px-7 py-8 border-[2.5px] border-ok-border shadow-[0_2px_12px_rgba(5,150,105,0.08)] text-center hover:-translate-y-0.5 transition-transform">
                        <div className="w-20 h-20 bg-ok-bg rounded-[20px] flex items-center justify-center mx-auto mb-5 text-[40px]">📊</div>
                        <div className="text-[22px] font-bold text-ink mb-2.5">CSV出力</div>
                        <div className="text-[16px] text-body leading-relaxed mb-6">Excelで開ける形式で記録を出力します。農場ごとに1行で出力されます。</div>
                        <div className="bg-[#059669] hover:bg-[#047857] transition-colors text-white rounded-[12px] py-4 text-[17px] font-bold">CSV をダウンロード</div>
                    </button>
                    {/* バックアップ */}
                    <button onClick={exportJSON}
                        className="bg-white rounded-[20px] px-7 py-8 border-[2.5px] border-[#BFDBFE] shadow-[0_2px_12px_rgba(37,99,235,0.08)] text-center hover:-translate-y-0.5 transition-transform">
                        <div className="w-20 h-20 bg-[#EFF6FF] rounded-[20px] flex items-center justify-center mx-auto mb-5 text-[40px]">💾</div>
                        <div className="text-[22px] font-bold text-ink mb-2.5">バックアップ</div>
                        <div className="text-[16px] text-body leading-relaxed mb-6">すべての記録をJSONファイルとして保存します。データ移行・保存に使用してください。</div>
                        <div className="bg-[#2563EB] hover:bg-[#1D4ED8] transition-colors text-white rounded-[12px] py-4 text-[17px] font-bold">バックアップを保存</div>
                    </button>
                    {/* 復元 */}
                    <label className="cursor-pointer bg-white rounded-[20px] px-7 py-8 border-[2.5px] border-sec-border shadow-[0_2px_12px_rgba(124,58,237,0.08)] text-center hover:-translate-y-0.5 transition-transform block">
                        <div className="w-20 h-20 bg-sec-bg rounded-[20px] flex items-center justify-center mx-auto mb-5 text-[40px]">📂</div>
                        <div className="text-[22px] font-bold text-ink mb-2.5">復元</div>
                        <div className="text-[16px] text-body leading-relaxed mb-6">バックアップしたJSONファイルから記録を復元します。現在の記録と統合されます。</div>

// ===== 計算画面 =====
function CalculationScreen({ setScreen, addRecord, showAlert, records, calcModel }) {
    const today = new Date().toISOString().split('T')[0];
    const [date, setDate] = useState(today);
    const [farms, setFarms] = useState([newFarm()]);
    const dateRef = useRef(null);

    function newFarm() {
        return { id: Date.now() + Math.random(), farmName: '', age: '', eggs: '', storageDays: '7' };
    }

    const month = getMonth(date);
    const farmResults = useMemo(() => farms.map(f => calcOneFarm(f.age, f.eggs, f.storageDays, month)), [farms, month]);
    const totalEggs = useMemo(() => farms.reduce((s, f) => s + (parseInt(f.eggs) || 0), 0), [farms]);
    const totalResult = useMemo(() => calcTotals(farmResults, totalEggs), [farmResults, totalEggs]);
    const totalPrimary = totalResult ? (calcModel === 'normal' ? totalResult.normal : totalResult.linear) : null;

    const setFarm = (id, key, val) => setFarms(prev => prev.map(f => f.id === id ? { ...f, [key]: val } : f));
    const removeFarm = (id) => { if (farms.length > 1) setFarms(prev => prev.filter(f => f.id !== id)); };
    const openPicker = () => { const el = dateRef.current; if (!el) return; if (el.showPicker) el.showPicker(); else el.click(); };

    const saveToRecords = () => {
        const valid = farms.filter(f => f.farmName.trim() && f.age && f.eggs);
        if (valid.length === 0) { showAlert('農場名・日齢・入卵数を入力してください', true); return; }
        const record = {
            id: Date.now(),
            recordDate: new Date().toISOString(),
            incubationDate: date,
            farms: valid.map(f => {
                const r = farmResults[farms.indexOf(f)];
                return {
                    id: f.id,
                    farmName: f.farmName.trim(),
                    parentAge: parseInt(f.age),
                    eggCount: parseInt(f.eggs),
                    storageDays: parseInt(f.storageDays) || 0,
                    predictions: r || null,
                    actual: { femaleChicks: null, totalChicks: null, recordedDate: null }
                };
            }),
            totalPredictions: totalResult ? { linear: totalResult.linear, normal: totalResult.normal } : null
        };
        addRecord(record);
    };

    const FARM_OPTS = ['農場A', '農場B', '農場C', '農場D', '農場E'];
    const AGE_PRESETS = [
        { label: '170〜200日', value: 185 },
        { label: '230〜250日', value: 240 },
        { label: '260〜350日', value: 305 },
        { label: '430日以上', value: 430 },
    ];
    const label = modelName(calcModel);
    const validCount = farms.filter(f => f.farmName.trim() && f.age && f.eggs).length;

    return (
        <div className="min-h-screen bg-cream flex flex-col">
            <PageHeader records={records} onBack={() => setScreen('top')} />
            <TitleBar border="border-brand-hd" icon="🧮" title="入卵数の計算" subtitle="数値を入力すると予測がすぐに更新されます" />

            <main className="flex-1 px-6 sm:px-12 py-6 flex flex-col lg:flex-row gap-6">
                {/* 左: フォーム */}
                <div className="flex-1 min-w-0 flex flex-col gap-4">
                    {/* 入卵日 */}
                    <div className="bg-white rounded-[16px] px-6 py-5 border-2 border-line">
                        <div className="text-[15px] font-bold text-body mb-2.5">📅 入卵日</div>
                        <div className="bg-brand-bg border-2 border-brand-border rounded-[12px] px-5 py-3.5 flex items-center justify-between relative">
                            <div className="text-[22px] font-bold text-ink">{fmtDateFull(date)}</div>
                            <button onClick={openPicker} className="bg-brand-border hover:brightness-95 rounded-[10px] px-4 py-2.5 text-[15px] font-bold text-brand-deep flex items-center gap-1.5 transition-all">📅 変更</button>
                            <input ref={dateRef} type="date" value={date} onChange={e => setDate(e.target.value)}
                                className="absolute right-[110px] opacity-0 w-px h-px pointer-events-none" />
                        </div>
                    </div>

                    {/* 農場カード */}
                    {farms.map((farm, idx) => {
                        const isPreset = FARM_OPTS.includes(farm.farmName);
                        return (
                            <div key={farm.id} className="bg-white rounded-[16px] px-[18px] py-3.5 border-[2.5px] border-brand-border fade-in">
                                <div className="flex justify-between items-center mb-2.5">
                                    <div className="text-[18px] font-bold text-ink">{farm.farmName || `農場 ${idx + 1}`}</div>
                                    {farms.length > 1 && (
                                        <button onClick={() => removeFarm(farm.id)}
                                            className="text-[13px] text-[#EF4444] font-semibold px-3 py-1.5 rounded-[8px] bg-[#FEF2F2] hover:bg-[#FEE2E2] transition-colors">× 削除</button>
                                    )}
                                </div>

                                {/* 農場名 */}
                                <div className="mb-2.5">
                                    <div className="text-[14px] font-bold text-body mb-1.5">農場名</div>
                                    <div className="flex flex-wrap gap-1.5">
                                        {FARM_OPTS.map(opt => (
                                            <button key={opt} onClick={() => setFarm(farm.id, 'farmName', opt)}
                                                className={`px-3.5 py-2 rounded-[10px] text-[15px] transition-colors ${farm.farmName === opt ? 'bg-brand text-white font-semibold' : 'bg-soft text-body font-medium border-2 border-line hover:bg-brand-bg'}`}>
                                                {opt}
                                            </button>
                                        ))}
                                    </div>
                                    <input type="text" value={isPreset ? '' : farm.farmName}
                                        onChange={e => setFarm(farm.id, 'farmName', e.target.value)}
                                        placeholder="その他の農場名を直接入力"
                                        className={`mt-2 w-full rounded-[10px] px-3 py-2 text-[15px] text-ink outline-none transition-colors placeholder:text-faint ${!isPreset && farm.farmName ? 'bg-brand-bg border-2 border-brand-border' : 'bg-soft border-2 border-line focus:border-brand-border'}`} />
                                </div>

                                {/* 親鳥日齢 */}
                                <div className="mb-2.5">
                                    <div className="text-[14px] font-bold text-body mb-1.5">親鳥日齢</div>
                                    <div className="inline-flex flex-col gap-[7px] w-full">
                                        <div className="flex flex-wrap gap-1.5">
                                            {AGE_PRESETS.map(p => (
                                                <button key={p.value} onClick={() => setFarm(farm.id, 'age', String(p.value))}
                                                    className={`px-3 py-[7px] rounded-[10px] text-[13px] transition-colors ${parseInt(farm.age) === p.value ? 'bg-brand text-white font-semibold' : 'bg-soft text-body font-medium border-2 border-line hover:bg-brand-bg'}`}>
                                                    {p.label}
                                                </button>
                                            ))}
                                        </div>
                                        <NumberField value={farm.age} onChange={e => setFarm(farm.id, 'age', e.target.value)}
                                            placeholder="日齢を直接入力（例：240）" unit="日" min="1" max="900"
                                            box="bg-brand-bg border-brand-border" />
                                    </div>
                                </div>

                                {/* 入卵数・貯卵日数 */}
                                <div className="grid grid-cols-2 gap-2.5">
                                    <div>
                                        <div className="text-[14px] font-bold text-body mb-1.5">入卵数</div>
                                        <NumberField value={farm.eggs} onChange={e => setFarm(farm.id, 'eggs', e.target.value)}
                                            placeholder="例：10000" unit="個" min="1" max="999999" box="bg-brand-bg border-brand-border" />
                                    </div>
                                    <div>
                                        <div className="text-[14px] font-bold text-body mb-1.5">貯卵日数</div>
                                        <NumberField value={farm.storageDays} onChange={e => setFarm(farm.id, 'storageDays', e.target.value)}
                                            placeholder="例：7" unit="日" min="0" max="30" box="bg-brand-bg border-brand-border" />
                                    </div>
                                </div>
                            </div>
                        );
                    })}

                    {/* 農場追加 */}
                    <button onClick={() => setFarms(prev => [...prev, newFarm()])}

                                    </div>
                                </div>
                                <div className="text-[12px] opacity-70 mb-4">{validCount}農場 ／ 総入卵数 {totalResult.totalEggs.toLocaleString()}個</div>
                                <button onClick={saveToRecords} className="w-full bg-white hover:bg-soft transition-colors rounded-[12px] px-5 py-4 text-[17px] font-bold text-sec">
                                    この結果を保存する
                                </button>
                            </>
                        ) : (
                            <div className="py-12 text-center text-white/70 text-[16px] leading-relaxed">農場名・日齢・入卵数を<br />入力すると予測が表示されます</div>
                        )}
                    </div>
                    <div className="bg-brand-bg border-[1.5px] border-brand-border rounded-[12px] px-4 py-3.5">
                        <div className="text-[13px] text-brand-deep leading-relaxed">💡 農場を追加すると、複数農場の合計予測が自動で計算されます</div>
                    </div>
                </div>
            </main>
        </div>
    );
}

// ===== 孵化実績入力画面（カレンダーファースト） =====
function HatchResultsScreen({ setScreen, records, updateRecord, showToast, calcModel }) {
    const now = new Date();
    const [calYear, setCalYear] = useState(now.getFullYear());
    const [calMonth, setCalMonth] = useState(now.getMonth());
    const [selectedDate, setSelectedDate] = useState(null);
    const [inputs, setInputs] = useState({});

    const recordDates = useMemo(() => new Set(records.map(r => r.incubationDate)), [records]);
    const recordStatus = useMemo(() => {
        const m = {};
        records.forEach(r => {
            const fs = r.farms || [];
            m[r.incubationDate] = (fs.length > 0 && fs.every(f => f.actual && f.actual.recordedDate)) ? 'done' : 'progress';
        });
        return m;
    }, [records]);
    const selectedRecord = useMemo(() =>
        selectedDate ? records.find(r => r.incubationDate === selectedDate) || null : null,
        [selectedDate, records]
    );

    useEffect(() => {
        if (!selectedRecord) { setInputs({}); return; }
        const init = {};
        selectedRecord.farms.forEach(f => {
            init[f.id] = {
                female: f.actual?.femaleChicks != null ? String(f.actual.femaleChicks) : '',
                total: f.actual?.totalChicks != null ? String(f.actual.totalChicks) : ''
            };
        });
        setInputs(init);
    }, [selectedRecord]);

    const handleChange = (farmId, key, val) => setInputs(prev => ({ ...prev, [farmId]: { ...prev[farmId], [key]: val } }));

    const saveAll = () => {
        updateRecord(selectedRecord.id, r => ({
            ...r,
            farms: r.farms.map(f => {
                const inp = inputs[f.id];
                if (!inp) return f;
                const female = inp.female === '' ? null : (parseInt(inp.female) || null);
                const total = inp.total === '' ? null : (parseInt(inp.total) || null);
                const hasAny = female != null || total != null;
                return { ...f, actual: { femaleChicks: female, totalChicks: total, recordedDate: hasAny ? new Date().toISOString() : (f.actual?.recordedDate || null) } };
            })
        }));
        showToast('実績を保存しました');
    };

    const prevMonth = () => { if (calMonth === 0) { setCalYear(y => y - 1); setCalMonth(11); } else setCalMonth(m => m - 1); };
    const nextMonth = () => { if (calMonth === 11) { setCalYear(y => y + 1); setCalMonth(0); } else setCalMonth(m => m + 1); };

    const calDays = useMemo(() => {
        const first = new Date(calYear, calMonth, 1);
        const last = new Date(calYear, calMonth + 1, 0);
        const cells = [];
        for (let i = 0; i < first.getDay(); i++) cells.push(null);
        for (let d = 1; d <= last.getDate(); d++) {
            const ds = `${calYear}-${padZ(calMonth + 1)}-${padZ(d)}`;
            cells.push({ d, ds, has: recordDates.has(ds) });
        }
        return cells;
    }, [calYear, calMonth, recordDates]);

    const todayStr = `${now.getFullYear()}-${padZ(now.getMonth() + 1)}-${padZ(now.getDate())}`;
    const cellClass = (cell) => {
        const base = 'py-2.5 rounded-[10px] text-[16px] transition-all ';
        if (cell.ds === selectedDate) return base + 'bg-sec text-white font-bold';
        if (cell.has) {
            return base + (recordStatus[cell.ds] === 'done'
                ? 'bg-ok-border text-[#065F46] font-bold hover:brightness-95 cursor-pointer'
                : 'bg-brand-hd text-brand-deep font-bold hover:brightness-95 cursor-pointer');
        }
        if (cell.ds === todayStr) return base + 'text-ink font-bold ring-2 ring-brand-border cursor-default';
        return base + 'text-ink cursor-default';
    };

    const Legend = () => (
        <div className="flex flex-wrap gap-4 mt-3 pt-3 border-t border-line">
            <div className="flex items-center gap-1.5"><div className="w-3.5 h-3.5 rounded bg-ok-border"></div><span className="text-[13px] text-[#6B7280]">記録あり（完了）</span></div>
            <div className="flex items-center gap-1.5"><div className="w-3.5 h-3.5 rounded bg-brand-hd"></div><span className="text-[13px] text-[#6B7280]">実績入力中</span></div>
            <div className="flex items-center gap-1.5"><div className="w-3.5 h-3.5 rounded bg-sec"></div><span className="text-[13px] text-[#6B7280]">選択中</span></div>
        </div>
    );

    return (
        <div className="min-h-screen bg-cream flex flex-col">
            <PageHeader records={records} border="border-sec-hd" onBack={() => setScreen('top')} />
            <TitleBar border="border-sec-hd" icon="📋" title="孵化実績入力" subtitle="入卵日を選んで、実際の孵化羽数を記録します" />

            <main className="flex-1 px-6 sm:px-12 py-6 flex flex-col lg:flex-row gap-7">
                {/* 左: カレンダー */}
                <div className="flex-1 min-w-0">
                    <div className="bg-white rounded-[16px] px-6 py-5 border-2 border-line">
                        <div className="flex items-center justify-between mb-4">
                            <button onClick={prevMonth} className="w-11 h-11 bg-sec-bg border-2 border-sec-border rounded-[10px] flex items-center justify-center text-[20px] font-bold text-sec hover:brightness-95 transition-all">‹</button>
                            <div className="text-[20px] font-bold text-ink">{calYear}年 {calMonth + 1}月</div>
                            <button onClick={nextMonth} className="w-11 h-11 bg-sec-bg border-2 border-sec-border rounded-[10px] flex items-center justify-center text-[20px] font-bold text-sec hover:brightness-95 transition-all">›</button>
                        </div>
                        <div className="grid grid-cols-7 gap-1.5 text-center">
                            {WEEKDAYS.map(d => <div key={d} className="text-[13px] font-bold text-faint py-2">{d}</div>)}
                            {calDays.map((cell, i) => cell ? (
                                <button key={i} onClick={() => cell.has && setSelectedDate(cell.ds)} className={cellClass(cell)}>{cell.d}</button>
                            ) : <div key={i} className="py-2.5" />)}
                        </div>
                        <Legend />
                    </div>
                </div>

                {/* 右: 実績入力フォーム */}
                <div className="w-full lg:w-[440px] flex-shrink-0">
                    {!selectedDate && (
                        <div className="bg-white rounded-[16px] p-10 text-center border-2 border-line">
                            <div className="text-[28px] mb-2">👈</div>
                            <div className="text-[18px] font-bold text-body">カレンダーから日付を選んでください</div>
                            <div className="text-[14px] text-faint mt-2">色のついた日付に入卵記録があります</div>
                        </div>
                    )}
                    {selectedDate && !selectedRecord && (
                        <div className="bg-white rounded-[16px] p-10 text-center border-2 border-line">
                            <div className="text-[18px] font-bold text-ink mb-1">{fmtDateMD(selectedDate)}</div>
                            <div className="text-[14px] text-faint">この日の入卵記録はありません</div>
                        </div>
                    )}
                    {selectedRecord && (
                        <div className="bg-white rounded-[16px] px-6 py-5 border-[2.5px] border-sec fade-in">
                            <div className="text-[18px] font-bold text-ink mb-1">{fmtDateMD(selectedRecord.incubationDate)}の実績入力</div>
                            <div className="text-[14px] text-faint mb-[18px]">農場ごとに実際の孵化羽数を入力してください</div>
                            <div className="flex flex-col gap-3.5">
                                {selectedRecord.farms.map(farm => (
                                    <FarmActualCard key={farm.id} farm={farm} calcModel={calcModel}
                                        female={inputs[farm.id]?.female ?? ''} total={inputs[farm.id]?.total ?? ''}
                                        onChange={handleChange} />
                                ))}
                            </div>
                            <button onClick={saveAll}
                                className="w-full bg-sec hover:bg-sec-hover transition-colors text-white rounded-[12px] px-5 py-4 text-[18px] font-bold mt-[18px]">
                                実績を保存する
                            </button>
                        </div>
                    )}
                </div>
            </main>
        </div>
    );
}

// ===== 農場別実績入力カード =====
function FarmActualCard({ farm, female, total, onChange, calcModel }) {
    const pred = farm.predictions;
    const primaryPred = pred ? (calcModel === 'normal' ? pred.normal : pred.linear) : null;
    const femaleActual = parseInt(female) || null;
    const filledF = female !== '' && female != null;
    const filledT = total !== '' && total != null;

    return (
        <div className="bg-sec-bg2 rounded-[12px] px-4 py-3 border-[1.5px] border-sec-border">
            <div className="flex justify-between items-center mb-2">
                <div className="text-[17px] font-bold text-ink">{farm.farmName}</div>
                {primaryPred && <div className="text-[13px] text-sec font-semibold">予測：{primaryPred.femaleChicks.toLocaleString()}羽</div>}
            </div>
            <div className="mb-2">
                <div className="text-[13px] text-body font-semibold mb-1">実際のメス鶏数</div>
                <NumberField value={female} onChange={e => onChange(farm.id, 'female', e.target.value)}
                    placeholder="未入力" unit="羽" min="0" box={filledF ? 'bg-white border-sec' : 'bg-white border-sec-border'} />
            </div>
            <div>
                <div className="text-[13px] text-body font-semibold mb-1">実際の総孵化数</div>
                <NumberField value={total} onChange={e => onChange(farm.id, 'total', e.target.value)}
                    placeholder="未入力" unit="羽" min="0" box={filledT ? 'bg-white border-sec' : 'bg-white border-sec-border'} />
            </div>

            {/* 精度分析（実績入力後） */}
            {femaleActual != null && pred && (
                <div className="mt-3 bg-ok-bg border border-ok-border rounded-[10px] px-3 py-2.5">
                    <div className="text-[12px] font-bold text-ok mb-2">予測精度（メス鶏数で比較）</div>
                    <div className="grid grid-cols-2 gap-2">
                        {[
                            { label: '区分線形', predVal: pred.linear?.femaleChicks },
                            { label: '正規分布', predVal: pred.normal?.femaleChicks }
                        ].filter(x => x.predVal != null).map((item, i) => {
                            const diff = femaleActual - item.predVal;
                            const pct = Math.abs(diff / item.predVal * 100).toFixed(1);
                            return (
                                <div key={i} className="bg-white rounded-[8px] px-2 py-2 text-center">
                                    <div className="text-[12px] text-faint mb-0.5">{item.label}</div>
                                    <div className={`text-[15px] font-bold ${diff >= 0 ? 'text-ok' : 'text-[#EF4444]'}`}>{diff >= 0 ? '+' : ''}{diff.toLocaleString()}羽</div>
                                    <div className="text-[12px] text-faint mt-0.5">誤差 {pct}%</div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            )}
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
