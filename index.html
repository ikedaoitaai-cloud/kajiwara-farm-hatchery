<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// ===== 計算ロジック =====
const piecewiseLinear = (age) => {
    if (age < 165) return 20.0;
    if (age <= 230) return 20 + (40 - 20) * (age - 165) / (230 - 165);
    if (age <= 250) return 40.0;
    if (age <= 530) return 40 - (40 - 35) * (age - 250) / (530 - 250);
    return 35 - (35 - 32) * Math.min((age - 530) / 200, 1.0);
};
const asymmetricNormal = (age) => {
    const sigma = age <= 240 ? 32 : 300;
    return 24.5 + 15.5 * Math.exp(-0.5 * Math.pow((age - 240) / sigma, 2));
};
const storageFactor = (days) => {
    if (days <= 7) return 1.0;
    if (days <= 10) return 0.95;
    if (days <= 16) return 0.85;
    return 0.60;
};
const seasonFactor = (month) => {
    if (month >= 6 && month <= 9) return 0.92;
    if (month === 1) return 0.95;
    return 1.0;
};
const calcOneFarm = (age, eggs, storageDays, month) => {
    const a = parseInt(age) || 0;
    const e = parseInt(eggs) || 0;
    const d = parseInt(storageDays) || 0;
    if (a <= 0 || e <= 0) return null;
    const sf = storageFactor(d);
    const seaf = seasonFactor(month);
    const linRate = piecewiseLinear(a);
    const norRate = asymmetricNormal(a);
    const linTotal = Math.round(e * (linRate / 100) * sf * seaf);
    const norTotal = Math.round(e * (norRate / 100) * sf * seaf);
    return {
        linear: { totalChicks: linTotal, femaleChicks: Math.round(linTotal * 0.61), hatchRate: ((linTotal / e) * 100).toFixed(1) },
        normal: { totalChicks: norTotal, femaleChicks: Math.round(norTotal * 0.61), hatchRate: ((norTotal / e) * 100).toFixed(1) }
    };
};
const calcTotals = (farmResults, totalEggs) => {
    if (totalEggs === 0) return null;
    const linTotal = farmResults.reduce((s, r) => s + (r ? r.linear.totalChicks : 0), 0);
    const norTotal = farmResults.reduce((s, r) => s + (r ? r.normal.totalChicks : 0), 0);
    return {
        totalEggs,
        linear: { totalChicks: linTotal, femaleChicks: Math.round(linTotal * 0.61), hatchRate: ((linTotal / totalEggs) * 100).toFixed(1) },
        normal: { totalChicks: norTotal, femaleChicks: Math.round(norTotal * 0.61), hatchRate: ((norTotal / totalEggs) * 100).toFixed(1) }
    };
};
const getMonth = (dateStr) => new Date(dateStr + 'T00:00:00').getMonth() + 1;
const fmtDate = (dateStr) => new Date(dateStr + 'T00:00:00').toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });
const padZ = (n) => String(n).padStart(2, '0');

// ===== マイグレーション =====
const migrateToV4 = (r) => ({
    ...r,
    farms: (r.farms || []).map(f => ({
        id: f.id || (Date.now() + Math.random()),
        farmName: f.farmName || '',
        parentAge: f.parentAge || parseInt(f.age) || 0,
        eggCount: f.eggCount || parseInt(f.eggs) || 0,
        storageDays: f.storageDays || 0,
        predictions: f.predictions || null,
        actual: f.actual || { femaleChicks: null, totalChicks: null, recordedDate: null }
    })),
    totalPredictions: r.totalPredictions || r.predictions || null
});

// ===== モーダル =====
function Modal({ config, onClose }) {
    if (!config) return null;
    return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ backgroundColor: 'rgba(0,0,0,0.5)' }}>
            <div className="bg-white rounded-2xl shadow-2xl p-7 w-full max-w-sm fade-in">
                <p className="text-center text-gray-800 text-xl font-medium mb-6 whitespace-pre-line">{config.message}</p>
                {config.type === 'alert' ? (
                    <button onClick={onClose} className="w-full py-4 bg-blue-600 active:bg-blue-700 text-white text-lg font-bold rounded-xl">OK</button>
                ) : (
                    <div className="flex gap-3">
                        <button onClick={() => { config.onConfirm(); onClose(); }}
                            className={`flex-1 py-4 text-lg font-bold rounded-xl text-white ${config.danger ? 'bg-red-600 active:bg-red-700' : 'bg-blue-600 active:bg-blue-700'}`}>
                            {config.confirmLabel || '確認'}
                        </button>
                        <button onClick={onClose} className="flex-1 py-4 bg-gray-100 active:bg-gray-200 text-gray-700 text-lg font-medium rounded-xl">
                            キャンセル
                        </button>
                    </div>
                )}
            </div>
        </div>
    );
}

// ===== トースト =====
function Toast({ message, onHide }) {
    useEffect(() => { const t = setTimeout(onHide, 2500); return () => clearTimeout(t); }, []);
    return (
        <div className="fixed bottom-8 left-1/2 z-40 toast-anim" style={{ transform: 'translateX(-50%)' }}>
            <div className="bg-gray-900 text-white px-6 py-4 rounded-full shadow-xl text-lg font-medium whitespace-nowrap">
                ✓ {message}
            </div>
        </div>
    );
}

// ===== 予測値グリッド（メス鶏数・総孵化数・孵化率の共通表示） =====
function PredictionGrid({ data, size = 'lg' }) {
    const num = size === 'lg' ? 'text-3xl sm:text-4xl' : 'text-2xl sm:text-3xl';
    const cells = [
        { label: 'メス鶏数', val: data.femaleChicks.toLocaleString(), unit: '羽' },
        { label: '総孵化数', val: data.totalChicks.toLocaleString(), unit: '羽' },
        { label: '孵化率', val: data.hatchRate, unit: '%' },
    ];
    return (
        <div className="grid grid-cols-3 gap-3 text-center">
            {cells.map(c => (
                <div key={c.label}>
                    <p className="text-base text-gray-500 mb-1">{c.label}</p>
                    <p className={`${num} font-bold text-blue-600`}>{c.val}</p>
                    <p className="text-base text-gray-400">{c.unit}</p>
                </div>
            ))}
        </div>
    );
}

// ===== メインアプリ =====
function App() {
    const [screen, setScreen] = useState('top');
    const [records, setRecords] = useState([]);
    const [calcModel, setCalcModelState] = useState(() => localStorage.getItem('calcModel') || 'linear');
    const [modalConfig, setModalConfig] = useState(null);
    const [toast, setToast] = useState(null);

    const setCalcModel = (m) => { setCalcModelState(m); localStorage.setItem('calcModel', m); };

    useEffect(() => {
        try {
            const v4 = localStorage.getItem('hatcheryRecordsV4');
            if (v4) { const p = JSON.parse(v4); if (Array.isArray(p)) { setRecords(p); return; } }
            const v3 = localStorage.getItem('hatcheryRecordsV3');
            if (v3) { const p = JSON.parse(v3); if (Array.isArray(p)) { const m = p.map(migrateToV4); setRecords(m); localStorage.setItem('hatcheryRecordsV4', JSON.stringify(m)); } }
        } catch { showAlert('データの読み込みに失敗しました。', true); }
    }, []);

    const persistRecords = (nr) => {
        try {
            localStorage.setItem('hatcheryRecordsV4', JSON.stringify(nr));
            setRecords(nr);
            return true;
        } catch (e) {
            showAlert(e.name === 'QuotaExceededError' ? '保存容量が不足しています。古い記録を削除してください。' : 'データの保存に失敗しました。', true);
            return false;
        }
    };
    const showAlert = (msg, isErr = false) => setModalConfig({ type: 'alert', message: msg, isError: isErr });
    const showConfirm = (msg, onConfirm, label = '確認', danger = false) => setModalConfig({ type: 'confirm', message: msg, onConfirm, confirmLabel: label, danger });
    const showToast = (msg) => setToast(msg);
    const addRecord = (r) => { if (persistRecords([r, ...records])) showToast('記録として保存しました'); };
    const updateRecord = (id, fn) => persistRecords(records.map(r => r.id === id ? fn(r) : r));
    const shared = { screen, setScreen, records, addRecord, updateRecord, persistRecords, showAlert, showConfirm, showToast, calcModel, setCalcModel };

    return (
        <>
            <Modal config={modalConfig} onClose={() => setModalConfig(null)} />
            {toast && <Toast message={toast} onHide={() => setToast(null)} />}
            {screen === 'top'         && <TopScreen {...shared} />}
            {screen === 'admin'       && <AdminScreen {...shared} />}
            {screen === 'export'      && <DataExportScreen {...shared} />}
            {screen === 'calculation' && <CalculationScreen {...shared} />}
            {screen === 'results'     && <HatchResultsScreen {...shared} />}
        </>
    );
}

// ===== データ出力画面 =====
function DataExportScreen({ setScreen, records, persistRecords, showAlert, showConfirm, showToast }) {

    const exportCSV = () => {
        if (records.length === 0) { showAlert('エクスポートする記録がありません'); return; }
        const header = ['入卵日', '農場名', '入卵数', '貯卵日数', '親鳥日齢', '予測メス鶏数', '予測総孵化数', '予測孵化率%', '実績メス鶏数', '実績総孵化数', '実績記録日', '登録日時'];
        const rows = records.flatMap(r =>
            r.farms.map(f => [
                r.incubationDate, f.farmName, f.eggCount, f.storageDays, f.parentAge,
                f.predictions?.linear?.femaleChicks ?? '',
                f.predictions?.linear?.totalChicks ?? '',
                f.predictions?.linear?.hatchRate ?? '',
                f.actual?.femaleChicks ?? '',
                f.actual?.totalChicks ?? '',
                f.actual?.recordedDate ? new Date(f.actual.recordedDate).toLocaleString('ja-JP') : '',
                new Date(r.recordDate).toLocaleString('ja-JP')
            ])
        );
        const csv = '﻿' + [header, ...rows].map(row => row.join(',')).join('\n');
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
        a.download = `孵化記録_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
        showToast('CSVをダウンロードしました');
    };

    const exportJSON = () => {
        if (records.length === 0) { showAlert('エクスポートする記録がありません'); return; }
        const data = { version: 'v4', exportDate: new Date().toISOString(), records };
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }));
        a.download = `孵化記録バックアップ_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        showToast('バックアップを保存しました');
    };

    const importJSON = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const data = JSON.parse(ev.target.result);
                let imported;
                if (data.version === 'v4' && Array.isArray(data.records)) imported = data.records;
                else if (data.version === 'v3' && Array.isArray(data.records)) imported = data.records.map(migrateToV4);
                else if (Array.isArray(data)) imported = data.map(migrateToV4);
                else throw new Error('Unknown format');
                showConfirm(
                    `${imported.length}件の記録をインポートします。\n現在の記録と統合されます。よろしいですか？`,
                    () => {
                        const ids = new Set(records.map(r => r.id));
                        const merged = [...imported.filter(r => !ids.has(r.id)), ...records];
                        merged.sort((a, b) => new Date(b.recordDate) - new Date(a.recordDate));
                        if (persistRecords(merged)) showToast(`${imported.length}件をインポートしました`);
                    }, 'インポート'
                );
            } catch { showAlert('ファイルの読み込みに失敗しました。バックアップファイルを確認してください。', true); }
        };
        reader.readAsText(file);
        e.target.value = '';
    };

    const ACTIONS = [
        {
            icon: '📊',
            title: 'CSV出力',
            desc: 'Excelなどで開けるCSV形式で記録を出力します。農場ごとに1行で出力されます。',
            color: 'green',
            onClick: exportCSV,
            isLabel: false,
        },
        {
            icon: '💾',
            title: 'バックアップ',
            desc: 'すべての記録をJSONファイルとして保存します。データの移行・保存に使用してください。',
            color: 'blue',
            onClick: exportJSON,
            isLabel: false,
        },
        {
            icon: '📂',
            title: '復元（インポート）',
            desc: 'バックアップしたJSONファイルから記録を復元します。現在の記録と統合されます。',
            color: 'purple',
            onClick: null,
            isLabel: true,
        },
    ];

    const colorMap = {
        green:  { bg: 'bg-green-50',  border: 'border-green-200',  icon: 'bg-green-100 text-green-700',  btn: 'bg-green-600 active:bg-green-700' },
        blue:   { bg: 'bg-blue-50',   border: 'border-blue-200',   icon: 'bg-blue-100 text-blue-700',    btn: 'bg-blue-600 active:bg-blue-700' },
        purple: { bg: 'bg-purple-50', border: 'border-purple-200', icon: 'bg-purple-100 text-purple-700', btn: 'bg-purple-600 active:bg-purple-700' },
    };

    return (
        <div className="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100 pb-10">
            <header className="bg-white shadow-sm sticky top-0 z-10">
                <div className="max-w-2xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center">
                    <h1 className="text-2xl sm:text-3xl font-bold text-gray-800">📤 データ出力</h1>
                    <button onClick={() => setScreen('top')} className="px-5 py-3 bg-gray-100 active:bg-gray-200 text-gray-700 rounded-xl text-lg font-medium">
                        ← 戻る
                    </button>
                </div>
            </header>
            <main className="max-w-2xl mx-auto px-4 sm:px-6 pt-5 space-y-4">
                <div className="bg-white rounded-2xl p-5 border border-gray-100">
                    <p className="text-lg text-gray-600 leading-relaxed">
                        現在 <strong className="text-gray-800 text-xl">{records.length}件</strong> の入卵記録が保存されています。
                    </p>
                    <p className="text-base text-gray-400 mt-1">定期的にバックアップを取ることをおすすめします。</p>
                </div>

                {ACTIONS.map((action, i) => {
                    const c = colorMap[action.color];
                    const inner = (
                        <div className={`w-full text-left bg-white rounded-2xl p-6 border-2 ${c.border} shadow-sm`}>
                            <div className="flex items-center gap-4 mb-3">
                                <div className={`w-14 h-14 rounded-2xl ${c.icon} flex items-center justify-center text-3xl shrink-0`}>
                                    {action.icon}
                                </div>
                                <div>
                                    <h2 className="text-xl sm:text-2xl font-bold text-gray-800">{action.title}</h2>
                                </div>
                            </div>
                            <p className="text-lg text-gray-500 leading-relaxed mb-4">{action.desc}</p>
                            <div className={`w-full py-4 ${c.btn} text-white text-xl font-bold rounded-xl text-center`}>
                                {action.title}
                                {action.isLabel && <span className="text-base font-normal ml-2">（ファイルを選択）</span>}
                            </div>
                        </div>
                    );
                    return action.isLabel ? (
                        <label key={i} className="block cursor-pointer">
                            {inner}
                            <input type="file" accept=".json" onChange={importJSON} className="hidden" />
                        </label>
                    ) : (
                        <button key={i} onClick={action.onClick} className="w-full text-left">
                            {inner}
                        </button>
                    );
                })}
            </main>
        </div>
    );
}

// ===== 計算画面 =====
function CalculationScreen({ setScreen, addRecord, showAlert, showToast, calcModel }) {
    const today = new Date().toISOString().split('T')[0];
    const [date, setDate] = useState(today);
    const [farms, setFarms] = useState([newFarm()]);

    function newFarm() {
        return { id: Date.now() + Math.random(), farmName: '', age: '', eggs: '', storageDays: '7' };
    }

    const month = getMonth(date);
    const farmResults = useMemo(() => farms.map(f => calcOneFarm(f.age, f.eggs, f.storageDays, month)), [farms, month]);
    const totalEggs = useMemo(() => farms.reduce((s, f) => s + (parseInt(f.eggs) || 0), 0), [farms]);
    const totalResult = useMemo(() => calcTotals(farmResults, totalEggs), [farmResults, totalEggs]);
    const totalPrimary = totalResult ? (calcModel === 'normal' ? totalResult.normal : totalResult.linear) : null;

    const setFarm = (id, key, val) => setFarms(prev => prev.map(f => f.id === id ? { ...f, [key]: val } : f));
    const removeFarm = (id) => { if (farms.length > 1) setFarms(prev => prev.filter(f => f.id !== id)); };

    const saveToRecords = () => {
        const valid = farms.filter(f => f.farmName.trim() && f.age && f.eggs);
        if (valid.length === 0) { showAlert('農場名・日齢・入卵数を入力してください', true); return; }
        const record = {
            id: Date.now(),
            recordDate: new Date().toISOString(),
            incubationDate: date,
            farms: valid.map(f => {
                const r = farmResults[farms.indexOf(f)];
                return {
                    id: f.id,
                    farmName: f.farmName.trim(),
                    parentAge: parseInt(f.age),
                    eggCount: parseInt(f.eggs),
                    storageDays: parseInt(f.storageDays) || 0,
                    predictions: r || null,
                    actual: { femaleChicks: null, totalChicks: null, recordedDate: null }
                };
            }),
            totalPredictions: totalResult ? { linear: totalResult.linear, normal: totalResult.normal } : null
        };
        addRecord(record);
    };

    const FARM_OPTS = ['農場A', '農場B', '農場C', '農場D', '農場E'];
    const AGE_PRESETS = [
        { label: '170〜200日', value: 185 },
        { label: '230〜250日', value: 240 },
        { label: '260〜350日', value: 305 },
        { label: '430日以上', value: 430 },
    ];

    const modelLabel = calcModel === 'normal' ? '非対称正規分布' : '区分線形';

    return (
        <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 pb-10">
            <header className="bg-white shadow-sm sticky top-0 z-10">
                <div className="max-w-2xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center">
                    <div>
                        <h1 className="text-xl sm:text-2xl font-bold text-gray-800">🧮 入卵数の計算</h1>
                        <p className="text-base text-gray-500">入力内容が変わると予測が即座に更新されます</p>
                    </div>
                    <button onClick={() => setScreen('top')} className="px-4 py-3 bg-gray-100 active:bg-gray-200 text-gray-700 rounded-xl text-base font-medium">
                        ← 戻る
                    </button>
                </div>
            </header>

            <main className="max-w-2xl mx-auto px-4 sm:px-6 pt-4 space-y-4">
                {/* 入卵日 */}
                <div className="bg-white rounded-xl shadow-sm p-5">
                    <label className="block text-lg font-bold text-gray-700 mb-2">入卵日</label>
                    <input type="date" value={date} onChange={e => setDate(e.target.value)}
                        className="w-full px-4 py-4 text-xl border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none transition-colors" />
                </div>

                {/* 農場カード */}
                {farms.map((farm, idx) => {
                    const result = farmResults[idx];
                    const primaryResult = result ? (calcModel === 'normal' ? result.normal : result.linear) : null;
                    const isPreset = FARM_OPTS.includes(farm.farmName);
                    return (
                        <div key={farm.id} className="bg-white rounded-xl shadow-sm p-5 sm:p-6 fade-in">
                            <div className="flex justify-between items-center mb-5">
                                <h3 className="font-bold text-gray-800 text-xl sm:text-2xl">
                                    {farm.farmName || `農場 ${idx + 1}`}
                                </h3>
                                {farms.length > 1 && (
                                    <button onClick={() => removeFarm(farm.id)}
                                        className="text-red-400 active:text-red-600 text-base px-3 py-1.5 rounded-lg active:bg-red-50">
                                        × 削除
                                    </button>
                                )}
                            </div>

                            {/* 農場名 */}
                            <div className="mb-5">
                                <p className="text-lg font-bold text-gray-700 mb-2">農場名</p>
                                <div className="flex flex-wrap gap-2 mb-3">
                                    {FARM_OPTS.map(opt => (
                                        <button key={opt} onClick={() => setFarm(farm.id, 'farmName', opt)}
                                            className={`px-5 py-3 rounded-xl text-lg font-medium transition-colors ${farm.farmName === opt ? 'bg-blue-600 text-white shadow-sm' : 'bg-gray-100 text-gray-700 active:bg-blue-50'}`}>
                                            {opt}
                                        </button>
                                    ))}
                                </div>
                                <input type="text"
                                    value={isPreset ? '' : farm.farmName}
                                    onChange={e => setFarm(farm.id, 'farmName', e.target.value)}
                                    placeholder="その他の農場名を直接入力"
                                    className={`w-full px-4 py-3 text-lg border-2 rounded-xl focus:outline-none transition-colors ${!isPreset && farm.farmName ? 'border-blue-500 bg-blue-50' : 'border-gray-200 focus:border-blue-400'}`} />
                            </div>

                            {/* 親鳥日齢 */}
                            <div className="mb-5">
                                <p className="text-lg font-bold text-gray-700 mb-2">親鳥日齢</p>
                                <div className="flex flex-wrap gap-2 mb-3">
                                    {AGE_PRESETS.map(p => (
                                        <button key={p.value} onClick={() => setFarm(farm.id, 'age', String(p.value))}
                                            className={`px-4 py-3 rounded-xl text-lg font-medium transition-colors ${parseInt(farm.age) === p.value ? 'bg-blue-600 text-white shadow-sm' : 'bg-gray-100 text-gray-700 active:bg-blue-50'}`}>
                                            {p.label}
                                        </button>
                                    ))}
                                </div>
                                <input type="number" value={farm.age}
                                    onChange={e => setFarm(farm.id, 'age', e.target.value)}
                                    placeholder="日齢を直接入力（例：240）"
                                    inputMode="numeric" min="1" max="900"
                                    className="w-full px-4 py-4 text-xl border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none transition-colors" />
                            </div>

                            {/* 入卵数・貯卵日数（ラベル常時表示） */}
                            <div className="grid grid-cols-2 gap-4 mb-5">
                                <div>
                                    <p className="text-lg font-bold text-gray-700 mb-2">入卵数</p>
                                    <input type="number" value={farm.eggs}
                                        onChange={e => setFarm(farm.id, 'eggs', e.target.value)}
                                        placeholder="例：10000"
                                        inputMode="numeric" min="1" max="999999"
                                        className="w-full px-4 py-4 text-xl border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none transition-colors" />
                                    <p className="text-base text-gray-400 mt-1 ml-1">個</p>
                                </div>
                                <div>
                                    <p className="text-lg font-bold text-gray-700 mb-2">貯卵日数</p>
                                    <input type="number" value={farm.storageDays}
                                        onChange={e => setFarm(farm.id, 'storageDays', e.target.value)}
                                        placeholder="例：7"
                                        inputMode="numeric" min="0" max="30"
                                        className="w-full px-4 py-4 text-xl border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none transition-colors" />
                                    <p className="text-base text-gray-400 mt-1 ml-1">日</p>
                                </div>
                            </div>

                            {/* 農場別即時予測 */}
                            {primaryResult ? (
                                <div className="bg-blue-50 border border-blue-100 rounded-xl p-4 sm:p-5">
                                    <p className="text-base text-blue-600 font-bold mb-3">この農場の予測（{modelLabel}）</p>
                                    <PredictionGrid data={primaryResult} size="lg" />
                                </div>
                            ) : (
                                <div className="bg-gray-50 rounded-xl p-5 text-center text-lg text-gray-400">
                                    農場名・日齢・入卵数を入力すると予測が表示されます
                                </div>
                            )}
                        </div>
                    );
                })}

                {/* 農場追加 */}
                <button onClick={() => setFarms(prev => [...prev, newFarm()])}
                    className="w-full py-5 bg-white border-2 border-dashed border-gray-300 active:border-blue-400 active:bg-blue-50 text-gray-500 active:text-blue-600 text-xl font-medium rounded-xl transition-all">
                    ＋ 農場を追加
                </button>

                {/* 合計予測 */}
                {totalResult ? (
                    <div className="bg-gradient-to-r from-green-600 to-emerald-600 rounded-2xl shadow-xl p-6 sm:p-8 text-white">
                        <div className="flex justify-between items-start mb-5">
                            <div>
                                <h3 className="text-xl sm:text-2xl font-bold">合計予測</h3>
                                <p className="text-base opacity-70 mt-1">
                                    {farms.filter(f => f.farmName.trim() && f.age && f.eggs).length}農場 / 総入卵数 {totalResult.totalEggs.toLocaleString()}個
                                </p>
                            </div>
                            <span className="text-sm bg-white bg-opacity-20 px-3 py-1 rounded-full">{modelLabel}</span>
                        </div>
                        <div className="grid grid-cols-3 gap-3 mb-6">
                            {[
                                { label: 'メス鶏数', val: totalPrimary.femaleChicks.toLocaleString(), unit: '羽' },
                                { label: '総孵化数', val: totalPrimary.totalChicks.toLocaleString(), unit: '羽' },
                                { label: '総孵化率', val: totalPrimary.hatchRate, unit: '%' },
                            ].map(item => (
                                <div key={item.label} className="bg-white bg-opacity-15 rounded-xl p-3 sm:p-4 text-center">
                                    <p className="text-sm opacity-80 mb-1">{item.label}</p>
                                    <p className="text-4xl sm:text-5xl font-bold">{item.val}</p>
                                    <p className="text-base opacity-70 mt-0.5">{item.unit}</p>
                                </div>
                            ))}
                        </div>
                        <button onClick={saveToRecords}
                            className="w-full py-5 bg-white text-green-700 font-bold text-xl rounded-xl active:bg-green-50 transition-colors shadow-sm">

                        </button>
                    </div>
                ) : (
                    <div className="bg-gray-100 rounded-2xl p-7 text-center text-lg text-gray-400">
                        農場データを入力すると合計予測が表示されます
                    </div>
                )}
            </main>
        </div>
    );
}

// ===== 孵化実績入力画面（カレンダーファースト） =====
function HatchResultsScreen({ setScreen, records, updateRecord, showToast, calcModel }) {
    const now = new Date();
    const [calYear, setCalYear] = useState(now.getFullYear());
    const [calMonth, setCalMonth] = useState(now.getMonth()); // 0-indexed
    const [selectedDate, setSelectedDate] = useState(null);

    const recordDates = useMemo(() => new Set(records.map(r => r.incubationDate)), [records]);
    const selectedRecord = useMemo(() =>
        selectedDate ? records.find(r => r.incubationDate === selectedDate) || null : null,
        [selectedDate, records]
    );

    const prevMonth = () => { if (calMonth === 0) { setCalYear(y => y - 1); setCalMonth(11); } else setCalMonth(m => m - 1); };
    const nextMonth = () => { if (calMonth === 11) { setCalYear(y => y + 1); setCalMonth(0); } else setCalMonth(m => m + 1); };

    const calDays = useMemo(() => {
        const first = new Date(calYear, calMonth, 1);
        const last = new Date(calYear, calMonth + 1, 0);
        const cells = [];
        for (let i = 0; i < first.getDay(); i++) cells.push(null);
        for (let d = 1; d <= last.getDate(); d++) {
            const ds = `${calYear}-${padZ(calMonth + 1)}-${padZ(d)}`;
            cells.push({ d, ds, has: recordDates.has(ds) });
        }
        return cells;
    }, [calYear, calMonth, recordDates]);

    const saveFarmActual = (recordId, farmId, femaleVal, totalVal) => {
        updateRecord(recordId, r => ({
            ...r,
            farms: r.farms.map(f => f.id === farmId ? {
                ...f,
                actual: {
                    femaleChicks: femaleVal === '' ? null : (parseInt(femaleVal) || null),
                    totalChicks: totalVal === '' ? null : (parseInt(totalVal) || null),
                    recordedDate: new Date().toISOString()
                }
            } : f)
        }));
        showToast('実績を保存しました');
    };

    return (
        <div className="min-h-screen bg-gradient-to-br from-purple-50 to-pink-100 pb-10">
            <header className="bg-white shadow-sm sticky top-0 z-10">
                <div className="max-w-2xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center">
                    <h1 className="text-xl sm:text-2xl font-bold text-gray-800">🐣 孵化実績入力</h1>
                    <button onClick={() => setScreen('top')} className="px-4 py-3 bg-gray-100 active:bg-gray-200 text-gray-700 rounded-xl text-base font-medium">
                        ← 戻る
                    </button>
                </div>
            </header>
            <main className="max-w-2xl mx-auto px-4 sm:px-6 pt-4 space-y-4">

                {/* カレンダー */}
                <div className="bg-white rounded-2xl shadow-sm p-5 sm:p-6">
                    <p className="text-lg text-gray-600 font-medium mb-4">入卵日を選んでください</p>

                    {/* 月ナビ */}
                    <div className="flex justify-between items-center mb-4">
                        <button onClick={prevMonth}
                            className="px-5 py-3 bg-gray-100 active:bg-gray-200 rounded-xl text-xl font-bold text-gray-700">
                            ◀
                        </button>
                        <span className="text-2xl sm:text-3xl font-bold text-gray-800">
                            {calYear}年{calMonth + 1}月
                        </span>
                        <button onClick={nextMonth}
                            className="px-5 py-3 bg-gray-100 active:bg-gray-200 rounded-xl text-xl font-bold text-gray-700">
                            ▶
                        </button>
                    </div>

                    {/* 曜日ヘッダー */}
                    <div className="grid grid-cols-7 mb-2">
                        {['日', '月', '火', '水', '木', '金', '土'].map((d, i) => (
                            <div key={d} className={`text-center text-lg font-bold py-1 ${i === 0 ? 'text-red-500' : i === 6 ? 'text-blue-500' : 'text-gray-500'}`}>
                                {d}
                            </div>
                        ))}
                    </div>

                    {/* 日付グリッド */}
                    <div className="grid grid-cols-7 gap-1.5">
                        {calDays.map((cell, i) => cell ? (
                            <button key={i}
                                onClick={() => cell.has && setSelectedDate(cell.ds)}
                                className={`aspect-square rounded-xl flex items-center justify-center text-xl font-medium transition-all
                                    ${cell.ds === selectedDate
                                        ? 'bg-purple-600 text-white shadow-md scale-105'
                                        : cell.has
                                        ? 'bg-purple-100 text-purple-800 active:bg-purple-200 font-bold'
                                        : 'text-gray-300 cursor-default'
                                    }`}>
                                {cell.d}
                            </button>
                        ) : <div key={i} />)}
                    </div>

                    {/* 凡例 */}
                    <div className="flex items-center gap-5 mt-4 pt-3 border-t border-gray-100">
                        <div className="flex items-center gap-2">
                            <div className="w-5 h-5 rounded-md bg-purple-100"></div>
                            <span className="text-base text-gray-500">入卵記録あり</span>
                        </div>
                        <div className="flex items-center gap-2">
                            <div className="w-5 h-5 rounded-md bg-purple-600"></div>
                            <span className="text-base text-gray-500">選択中</span>
                        </div>
                    </div>
                </div>

                {/* 日付未選択 */}
                {!selectedDate && (
                    <div className="bg-white rounded-2xl p-10 text-center">
                        <p className="text-2xl text-gray-300 mb-2">☝️</p>
                        <p className="text-xl text-gray-400">上のカレンダーから日付を選んでください</p>
                        <p className="text-lg text-gray-300 mt-2">紫色の日付に入卵記録があります</p>
                    </div>
                )}

                {/* 記録なし */}
                {selectedDate && !selectedRecord && (
                    <div className="bg-white rounded-2xl p-10 text-center">
                        <p className="text-xl font-bold text-gray-700 mb-2">{fmtDate(selectedDate)}</p>
                        <p className="text-lg text-gray-400">この日の入卵記録はありません</p>
                    </div>
                )}

                {/* 農場別実績入力 */}
                {selectedRecord && (
                    <div className="space-y-4 fade-in">
                        <div className="bg-white rounded-2xl p-5">
                            <h2 className="text-2xl sm:text-3xl font-bold text-gray-800 mb-1">{fmtDate(selectedRecord.incubationDate)}</h2>
                            <p className="text-lg text-gray-500">
                                {selectedRecord.farms.length}農場 ／ 総入卵数 {selectedRecord.farms.reduce((s, f) => s + (f.eggCount || 0), 0).toLocaleString()}個
                            </p>
                        </div>
                        {selectedRecord.farms.map(farm => (
                            <FarmActualSection key={farm.id} farm={farm} calcModel={calcModel}
                                onSave={(f, t) => saveFarmActual(selectedRecord.id, farm.id, f, t)} />
                        ))}
                    </div>
                )}
            </main>
        </div>
    );
}

// ===== 農場別実績入力セクション =====
function FarmActualSection({ farm, onSave, calcModel }) {
    const pred = farm.predictions;
    const saved = farm.actual || {};
    const [femaleInput, setFemaleInput] = useState(saved.femaleChicks != null ? String(saved.femaleChicks) : '');
    const [totalInput, setTotalInput] = useState(saved.totalChicks != null ? String(saved.totalChicks) : '');

    useEffect(() => {
        setFemaleInput(saved.femaleChicks != null ? String(saved.femaleChicks) : '');
        setTotalInput(saved.totalChicks != null ? String(saved.totalChicks) : '');
    }, [saved.femaleChicks, saved.totalChicks]);

    const primaryPred = pred ? (calcModel === 'normal' ? pred.normal : pred.linear) : null;
    const femaleActual = parseInt(femaleInput) || null;
    const modelLabel = calcModel === 'normal' ? '非対称正規分布' : '区分線形';

    return (
        <div className="bg-white rounded-2xl p-5 sm:p-6">
            {/* 農場名・基本情報 */}
            <div className="flex justify-between items-baseline mb-4">
                <h3 className="text-2xl font-bold text-gray-700">{farm.farmName}</h3>
                <div className="text-right text-base text-gray-400">
                    <p>{(farm.eggCount || 0).toLocaleString()}個入卵</p>
                    <p>{farm.parentAge}日齢 ／ 貯卵{farm.storageDays}日</p>
                </div>
            </div>

            {/* 予測値 */}
            {primaryPred ? (
                <div className="bg-blue-50 rounded-xl p-4 mb-5">
                    <p className="text-base text-blue-600 font-bold mb-3">予測（{modelLabel}モデル）</p>
                    <PredictionGrid data={primaryPred} size="sm" />
                </div>
            ) : (
                <div className="bg-gray-50 rounded-xl p-3 mb-5 text-center text-base text-gray-400">
                    予測データなし（旧形式の記録）
                </div>
            )}

            {/* 保存済みバッジ */}
            {saved.recordedDate && (
                <p className="text-base text-green-600 font-medium mb-3">
                    ✓ 実績入力済み（{new Date(saved.recordedDate).toLocaleDateString('ja-JP')}）
                </p>
            )}

            {/* 実績入力（ラベル常時表示） */}
            <div className="space-y-4">
                <div className="grid grid-cols-2 gap-4">
                    <div>
                        <p className="text-lg font-bold text-gray-700 mb-2">実績 メス鶏数（羽）</p>
                        <input type="number"
                            value={femaleInput}
                            onChange={e => setFemaleInput(e.target.value)}
                            placeholder="羽数を入力"
                            inputMode="numeric" min="0"
                            className="w-full px-4 py-4 text-xl border-2 border-gray-200 rounded-xl focus:border-green-500 focus:outline-none transition-colors" />
                    </div>
                    <div>
                        <p className="text-lg font-bold text-gray-700 mb-2">実績 総孵化数（羽）</p>
                        <input type="number"
                            value={totalInput}
                            onChange={e => setTotalInput(e.target.value)}
                            placeholder="羽数を入力"
                            inputMode="numeric" min="0"
                            className="w-full px-4 py-4 text-xl border-2 border-gray-200 rounded-xl focus:border-green-500 focus:outline-none transition-colors" />
                    </div>
                </div>
                <button onClick={() => onSave(femaleInput, totalInput)}
                    className="w-full py-5 bg-green-600 active:bg-green-700 text-white text-xl font-bold rounded-xl transition-colors">
                    実績を保存する
                </button>
            </div>

            {/* 精度分析（実績入力後） */}
            {femaleActual != null && pred && (
                <div className="mt-5 bg-green-50 border border-green-100 rounded-xl p-4">
                    <p className="text-lg font-bold text-green-700 mb-3">予測精度（メス鶏数で比較）</p>
                    <div className="grid grid-cols-2 gap-3">
                        {[
                            { label: '区分線形', predVal: pred.linear?.femaleChicks },
                            { label: '正規分布', predVal: pred.normal?.femaleChicks }
                        ].filter(x => x.predVal != null).map((item, i) => {
                            const diff = femaleActual - item.predVal;
                            const pct = Math.abs(diff / item.predVal * 100).toFixed(1);
                            const acc = (100 - parseFloat(pct)).toFixed(1);
                            return (
                                <div key={i} className="bg-white rounded-xl p-4 text-center">
                                    <p className="text-base text-gray-500 mb-1">{item.label}</p>
                                    <p className={`text-2xl font-bold ${diff >= 0 ? 'text-green-600' : 'text-red-500'}`}>
                                        {diff >= 0 ? '+' : ''}{diff.toLocaleString()}羽
                                    </p>
                                    <p className="text-base text-gray-400 mt-1">誤差率 {pct}%</p>
                                    <p className="text-lg font-bold text-blue-600 mt-0.5">精度 {acc}%</p>
                                </div>
                            );
                        })}
                    </div>
                </div>
            )}
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
