<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="カジワラファーム様向け孵化率予測システム">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>孵化率予測システム - カジワラファーム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        button, input, select, label { touch-action: manipulation; }
        body {
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }
        html { scroll-behavior: smooth; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .toast-anim { animation: slideUp 0.3s ease-out; }
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .shadow-xl, .shadow-lg, .shadow-sm { box-shadow: none !important; }
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // ===== アイコン =====
        const Calendar = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
        const Plus = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
        const Trash2 = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
        const ChevronRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
        const History = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>;
        const Save = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
        const X = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
        const Edit2 = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>;
        const BarChart3 = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>;
        const TrendingUp = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>;
        const Download = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
        const Upload = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;
        const AlertCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;
        const CheckCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const Printer = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;

        // ===== 計算ロジック =====
        const piecewiseLinear = (age) => {
            if (age < 165) return 20.0;
            if (age <= 230) return 20 + (40 - 20) * (age - 165) / (230 - 165);
            if (age <= 250) return 40.0;
            if (age <= 530) return 40 - (40 - 35) * (age - 250) / (530 - 250);
            return 35 - (35 - 32) * Math.min((age - 530) / 200, 1.0);
        };
        const asymmetricNormal = (age) => {
            const sigma = age <= 240 ? 32 : 300;
            return 24.5 + 15.5 * Math.exp(-0.5 * Math.pow((age - 240) / sigma, 2));
        };
        const storageDaysFactor = (days) => {
            if (days <= 7) return 1.0;
            if (days <= 10) return 0.95;
            if (days <= 16) return 0.85;
            return 0.60;
        };
        const seasonFactor = (month) => {
            if (month >= 6 && month <= 9) return 0.92;
            if (month === 1) return 0.95;
            return 1.0;
        };
        const calculateMultiFarms = (farms, date, method = 'linear') => {
            let totalEggs = 0, weightedStorageDays = 0, totalPredictedChicks = 0;
            const month = new Date(date + 'T00:00:00').getMonth() + 1;
            farms.forEach(farm => {
                const eggs = parseInt(farm.eggs);
                const age = parseInt(farm.age);
                const storageDays = parseInt(farm.storageDays);
                totalEggs += eggs;
                weightedStorageDays += eggs * storageDays;
                const baseRate = method === 'linear' ? piecewiseLinear(age) : asymmetricNormal(age);
                totalPredictedChicks += eggs * (baseRate / 100) * storageDaysFactor(storageDays) * seasonFactor(month);
            });
            const totalChicks = Math.round(totalPredictedChicks);
            return {
                totalEggs,
                avgStorageDays: (weightedStorageDays / totalEggs).toFixed(1),
                totalChicks,
                femaleChicks: Math.round(totalChicks * 0.61),
                hatchRate: ((totalChicks / totalEggs) * 100).toFixed(1)
            };
        };
        const getSeasonFromMonth = (month) => {
            if (month >= 3 && month <= 5) return 'spring';
            if (month >= 6 && month <= 8) return 'summer';
            if (month >= 9 && month <= 11) return 'autumn';
            return 'winter';
        };
        const formatDate = (dateStr) =>
            new Date(dateStr + 'T00:00:00').toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });

        // ===== モーダル =====
        function Modal({ config, onClose }) {
            if (!config) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{backgroundColor:'rgba(0,0,0,0.5)'}}>
                    <div className="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm fade-in">
                        <div className={`w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-4 ${config.isError ? 'bg-red-100 text-red-600' : 'bg-amber-100 text-amber-600'}`}>
                            <AlertCircle />
                        </div>
                        <p className="text-center text-gray-800 text-lg font-medium mb-6 whitespace-pre-line">{config.message}</p>
                        {config.type === 'alert' ? (
                            <button onClick={onClose} className="w-full py-3 bg-blue-600 active:bg-blue-700 text-white font-bold rounded-xl transition-colors">
                                OK
                            </button>
                        ) : (
                            <div className="flex gap-3">
                                <button onClick={() => { config.onConfirm(); onClose(); }} className="flex-1 py-3 bg-red-600 active:bg-red-700 text-white font-bold rounded-xl transition-colors">
                                    {config.confirmLabel || '削除'}
                                </button>
                                <button onClick={onClose} className="flex-1 py-3 bg-gray-100 active:bg-gray-200 text-gray-700 font-medium rounded-xl transition-colors">
                                    キャンセル
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ===== トースト =====
        function Toast({ message, onHide }) {
            useEffect(() => {
                const t = setTimeout(onHide, 2500);
                return () => clearTimeout(t);
            }, []);
            return (
                <div className="fixed bottom-8 left-1/2 z-40 toast-anim" style={{transform:'translateX(-50%)'}}>
                    <div className="flex items-center gap-2 bg-gray-900 text-white px-5 py-3 rounded-full shadow-xl text-sm font-medium whitespace-nowrap">
                        <CheckCircle /> {message}
                    </div>
                </div>
            );
        }

        // ===== メインアプリ =====
        function HatcheryApp() {
            const [screen, setScreen] = useState('date-select');
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [farms, setFarms] = useState([]);
            const [editingFarm, setEditingFarm] = useState(null);
            const [isEditing, setIsEditing] = useState(false);
            const [resultLinear, setResultLinear] = useState(null);
            const [resultNormal, setResultNormal] = useState(null);
            const [activeMethod, setActiveMethod] = useState('linear');
            const [records, setRecords] = useState([]);
            const [modalConfig, setModalConfig] = useState(null);
            const [toast, setToast] = useState(null);
            const [errors, setErrors] = useState({});

            const farmOptions = ['農場A', '農場B', '農場C', '農場D', '農場E', 'その他'];
            const ageButtons = [
                { label: '170-200日齢', value: 185 },
                { label: '230-250日齢', value: 240 },
                { label: '260-350日齢', value: 305 },
                { label: '430日齢以上', value: 430 }
            ];

            const showAlert = (message, isError = false) => setModalConfig({ type: 'alert', message, isError });
            const showConfirm = (message, onConfirm, confirmLabel = '削除') => setModalConfig({ type: 'confirm', message, onConfirm, confirmLabel });
            const showToast = (message) => setToast(message);

            // データ読み込み
            useEffect(() => {
                try {
                    const saved = localStorage.getItem('hatcheryRecordsV3');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if (Array.isArray(parsed)) {
                            setRecords(parsed);
                        } else {
                            throw new Error('Invalid format');
                        }
                    }
                } catch (e) {
                    try {
                        const raw = localStorage.getItem('hatcheryRecordsV3');
                        if (raw) localStorage.setItem('hatcheryRecordsV3_backup', raw);
                        localStorage.removeItem('hatcheryRecordsV3');
                    } catch {}
                    showAlert('保存データの読み込みに失敗しました。データをリセットしました。', true);
                }
            }, []);

            // データ保存
            const saveRecords = (newRecords) => {
                try {
                    localStorage.setItem('hatcheryRecordsV3', JSON.stringify(newRecords));
                    setRecords(newRecords);
                    return true;
                } catch (e) {
                    if (e.name === 'QuotaExceededError') {
                        showAlert('保存容量が不足しています。古い記録を削除してから再度お試しください。', true);
                    } else {
                        showAlert('データの保存に失敗しました。ブラウザの設定を確認してください。', true);
                    }
                    return false;
                }
            };

            // バリデーション
            const validateFarm = (farm) => {
                const errs = {};
                const finalName = farm.farmName === 'その他' ? farm.customFarmName : farm.farmName;
                if (!finalName || !finalName.trim()) errs.farmName = '農場を選択してください';
                if (!farm.age) errs.age = '親鳥日齢を選択してください';
                const eggs = parseInt(farm.eggs);
                if (!farm.eggs || isNaN(eggs)) errs.eggs = '入卵数を入力してください';
                else if (eggs <= 0) errs.eggs = '1個以上を入力してください';
                else if (eggs > 999999) errs.eggs = '最大999,999個まで入力できます';
                const days = parseInt(farm.storageDays);
                if (farm.storageDays === '' || isNaN(days)) errs.storageDays = '貯卵日数を入力してください';
                else if (days < 0) errs.storageDays = '0日以上を入力してください';
                else if (days > 30) errs.storageDays = '最大30日まで入力できます';
                return errs;
            };

            const addFarm = () => {
                setErrors({});
                setEditingFarm({ id: Date.now(), farmName: '', age: '', eggs: '', storageDays: '', customFarmName: '' });
                setIsEditing(false);
            };
            const editFarm = (farm) => {
                setErrors({});
                setEditingFarm({ ...farm });
                setIsEditing(true);
            };
            const saveFarm = () => {
                const errs = validateFarm(editingFarm);
                if (Object.keys(errs).length > 0) { setErrors(errs); return; }
                const finalFarmName = editingFarm.farmName === 'その他' ? editingFarm.customFarmName.trim() : editingFarm.farmName;
                const farmData = { ...editingFarm, farmName: finalFarmName };
                delete farmData.customFarmName;
                if (isEditing) {
                    setFarms(farms.map(f => f.id === farmData.id ? farmData : f));
                } else {
                    setFarms([...farms, farmData]);
                }
                setErrors({});
                setEditingFarm(null);
                setIsEditing(false);
            };
            const deleteFarm = (id) => {
                showConfirm('この農場データを削除しますか？', () => setFarms(farms.filter(f => f.id !== id)));
            };

            const calculate = () => {
                if (farms.length === 0) { showAlert('農場データを追加してください', true); return; }
                const linearResult = calculateMultiFarms(farms, date, 'linear');
                const normalResult = calculateMultiFarms(farms, date, 'normal');
                setResultLinear(linearResult);
                setResultNormal(normalResult);
                const month = new Date(date + 'T00:00:00').getMonth() + 1;
                const record = {
                    id: Date.now(),
                    recordDate: new Date().toISOString(),
                    incubationDate: date,
                    farms: farms.map(farm => ({
                        farmName: farm.farmName,
                        parentAge: parseInt(farm.age),
                        eggCount: parseInt(farm.eggs),
                        storageDays: parseInt(farm.storageDays)
                    })),
                    environment: { month, season: getSeasonFromMonth(month) },
                    predictions: {
                        linear: { femaleChicks: linearResult.femaleChicks, totalChicks: linearResult.totalChicks, hatchRate: parseFloat(linearResult.hatchRate) },
                        normal: { femaleChicks: normalResult.femaleChicks, totalChicks: normalResult.totalChicks, hatchRate: parseFloat(normalResult.hatchRate) }
                    },
                    actual: null
                };
                if (saveRecords([record, ...records])) setScreen('result');
            };

            const updateActualData = (recordId, actualData) => {
                const updated = records.map(r => r.id === recordId ? {
                    ...r,
                    actual: {
                        femaleChicks: parseInt(actualData.femaleChicks) || null,
                        totalChicks: parseInt(actualData.totalChicks) || null,
                        recordedDate: new Date().toISOString()
                    }
                } : r);
                if (saveRecords(updated)) showToast('実績データを保存しました');
            };

            const deleteRecord = (recordId) => {
                showConfirm('この記録を削除しますか？', () => {
                    const updated = records.filter(r => r.id !== recordId);
                    if (saveRecords(updated)) showToast('記録を削除しました');
                });
            };

            const reset = () => {
                setScreen('date-select');
                setDate(new Date().toISOString().split('T')[0]);
                setFarms([]);
                setEditingFarm(null);
                setIsEditing(false);
                setResultLinear(null);
                setResultNormal(null);
                setActiveMethod('linear');
                setErrors({});
            };

            // CSV エクスポート
            const exportCSV = () => {
                if (records.length === 0) { showAlert('エクスポートする記録がありません'); return; }
                const header = ['入卵日','農場数','総入卵数','メス鶏数(区分線形)','総孵化数(区分線形)','孵化率(区分線形)%','メス鶏数(正規分布)','総孵化数(正規分布)','孵化率(正規分布)%','実績メス鶏数','実績総孵化数','登録日時'];
                const rows = records.map(r => [
                    r.incubationDate, r.farms.length,
                    r.farms.reduce((s, f) => s + f.eggCount, 0),
                    r.predictions.linear.femaleChicks, r.predictions.linear.totalChicks, r.predictions.linear.hatchRate,
                    r.predictions.normal.femaleChicks, r.predictions.normal.totalChicks, r.predictions.normal.hatchRate,
                    r.actual?.femaleChicks || '', r.actual?.totalChicks || '',
                    new Date(r.recordDate).toLocaleString('ja-JP')
                ]);
                const csv = '\uFEFF' + [header, ...rows].map(row => row.join(',')).join('\n');
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
                a.download = `孵化記録_${new Date().toISOString().split('T')[0]}.csv`;
                a.click();
                showToast('CSVをダウンロードしました');
            };

            // JSON バックアップ
            const exportJSON = () => {
                if (records.length === 0) { showAlert('エクスポートする記録がありません'); return; }
                const data = { version: 'v3', exportDate: new Date().toISOString(), records };
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }));
                a.download = `孵化記録バックアップ_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                showToast('バックアップを保存しました');
            };

            // JSON インポート
            const importJSON = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        const importedRecords = (data.version === 'v3' && Array.isArray(data.records))
                            ? data.records
                            : Array.isArray(data) ? data : null;
                        if (!importedRecords) throw new Error('Invalid format');
                        showConfirm(
                            `${importedRecords.length}件の記録をインポートします。\n現在の記録と統合されます。よろしいですか？`,
                            () => {
                                const existingIds = new Set(records.map(r => r.id));
                                const merged = [...importedRecords, ...records.filter(r => !existingIds.has(r.id))];
                                merged.sort((a, b) => new Date(b.recordDate) - new Date(a.recordDate));
                                if (saveRecords(merged)) showToast(`${importedRecords.length}件をインポートしました`);
                            },
                            'インポート'
                        );
                    } catch {
                        showAlert('ファイルの読み込みに失敗しました。バックアップファイルを確認してください。', true);
                    }
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            const totalEggs = farms.reduce((sum, f) => sum + parseInt(f.eggs || 0), 0);
            const weightedStorage = farms.reduce((sum, f) => sum + parseInt(f.eggs || 0) * parseInt(f.storageDays || 0), 0);
            const avgStorage = totalEggs > 0 ? (weightedStorage / totalEggs).toFixed(1) : '0.0';

            const GlobalUI = () => (
                <>
                    <Modal config={modalConfig} onClose={() => setModalConfig(null)} />
                    {toast && <Toast message={toast} onHide={() => setToast(null)} />}
                </>
            );

            // ===== 画面1: 日付選択 =====
            if (screen === 'date-select') return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100">
                    <GlobalUI />
                    <header className="bg-white shadow-sm">
                        <div className="max-w-2xl mx-auto px-4 sm:px-6 py-4">
                            <h1 className="text-xl sm:text-2xl font-bold text-gray-800">🐣 孵化率予測システム</h1>
                            <p className="text-xs sm:text-sm text-gray-600 mt-1">カジワラファーム</p>
                        </div>
                    </header>
                    <main className="max-w-2xl mx-auto px-4 sm:px-6 py-8 sm:py-12">
                        <div className="bg-white rounded-2xl shadow-xl p-6 sm:p-12 text-center">
                            <div className="w-16 h-16 sm:w-20 sm:h-20 mx-auto mb-4 sm:mb-6 text-blue-600 flex items-center justify-center">
                                <Calendar />
                            </div>

                                        {/* 実績入力 */}
                                        <div className="bg-gray-50 rounded-lg p-3">
                                            <label className="block text-xs sm:text-sm font-medium text-gray-700 mb-2">実際の孵化羽数（後日入力）</label>
                                            <div className="space-y-2">
                                                <div className="flex gap-2">
                                                    <input type="number" id={`actual-female-${record.id}`}
                                                        defaultValue={record.actual?.femaleChicks || ''}
                                                        placeholder="メス鶏数" inputMode="numeric"
                                                        className="flex-1 px-3 py-3 text-base border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none"
                                                    />
                                                    <input type="number" id={`actual-total-${record.id}`}
                                                        defaultValue={record.actual?.totalChicks || ''}
                                                        placeholder="総孵化数" inputMode="numeric"
                                                        className="flex-1 px-3 py-3 text-base border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none"
                                                    />
                                                </div>
                                                <button onClick={() => {
                                                    const f = document.getElementById(`actual-female-${record.id}`);
                                                    const t = document.getElementById(`actual-total-${record.id}`);
                                                    updateActualData(record.id, { femaleChicks: f.value, totalChicks: t.value });
                                                }} className="w-full py-3 bg-blue-600 active:bg-blue-700 text-white font-medium rounded-lg text-sm">
                                                    実績を保存
                                                </button>
                                            </div>
                                            {record.actual?.femaleChicks && (
                                                <div className="mt-3 pt-3 border-t border-gray-200">
                                                    <p className="text-xs font-medium text-gray-700 mb-2">予測精度</p>
                                                    <div className="grid grid-cols-2 gap-2">
                                                        {[
                                                            { label:'区分線形との差', pred:record.predictions.linear.femaleChicks, color:'text-blue-600' },
                                                            { label:'正規分布との差', pred:record.predictions.normal.femaleChicks, color:'text-purple-600' }
                                                        ].map((item, i) => {
                                                            const diff = record.actual.femaleChicks - item.pred;
                                                            const acc = (100 - Math.abs(diff / item.pred * 100)).toFixed(1);
                                                            return (
                                                                <div key={i} className="bg-white rounded p-2">
                                                                    <p className="text-xs text-gray-600 mb-1">{item.label}</p>
                                                                    <p className={`text-sm font-semibold ${diff >= 0 ? 'text-green-600' : 'text-red-600'}`}>
                                                                        {diff >= 0 ? '+' : ''}{diff.toLocaleString()}羽
                                                                    </p>
                                                                    <p className={`text-xs mt-1 ${item.color}`}>精度: {acc}%</p>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                        {/* 削除ボタン */}
                                        <div className="mt-3 flex justify-end">
                                            <button onClick={() => deleteRecord(record.id)} className="text-xs text-gray-400 active:text-red-600 flex items-center gap-1 py-1 px-2">
                                                <Trash2 /> この記録を削除
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HatcheryApp />);
    </script>
</body>
</html>
